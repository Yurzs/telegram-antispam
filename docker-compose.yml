services:
  bot:
    # Use pre-built image from GitHub Container Registry
    image: ghcr.io/yurzs/telegram-antispam:latest
    # Or build locally (comment out 'image' line above and uncomment below)
    # build: .
    env_file:
      - .env
    restart: unless-stopped
    # Uncomment the ports section below if using webhook mode
    # ports:
    #   - "8080:8080"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
